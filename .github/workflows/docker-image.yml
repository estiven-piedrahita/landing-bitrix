name: Deploy Landing

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Login en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir imagen Docker
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/landing-bitrix:latest .

      - name: Subir imagen Docker
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/landing-bitrix:latest

      - name: Desplegar en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/${{ github.repository_owner }}/landing-bitrix:latest
            docker rm -f landing-bitrix || true
            docker run -d \
              --name landing-bitrix \
              --restart always \
              -p 8081:80 \
              ghcr.io/${{ github.repository_owner }}/landing-bitrix:latest
